apiVersion: v1
kind: ServiceAccount
metadata:
  name: vivek-dev
  namespace: default
  labels:
    app.kubernetes.io/managed-by: codex
    app.kubernetes.io/name: vivek-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vivek-dev-kubectl
  namespace: default
  labels:
    app.kubernetes.io/managed-by: codex
    app.kubernetes.io/name: vivek-dev
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/status
      - services
      - services/status
      - persistentvolumeclaims
      - persistentvolumeclaims/status
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/exec
      - pods/attach
      - pods/portforward
    verbs:
      - get
      - create
  - apiGroups:
      - apps
    resources:
      - deployments
      - deployments/status
      - replicasets
      - replicasets/status
      - statefulsets
      - statefulsets/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments/scale
      - replicasets/scale
      - statefulsets/scale
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - jobs
      - jobs/status
      - cronjobs
      - cronjobs/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vivek-dev-kubectl
  namespace: default
  labels:
    app.kubernetes.io/managed-by: codex
    app.kubernetes.io/name: vivek-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vivek-dev-kubectl
subjects:
  - kind: ServiceAccount
    name: vivek-dev
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vivek-dev-skypilot-read
  labels:
    app.kubernetes.io/managed-by: codex
    app.kubernetes.io/name: vivek-dev
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - node.k8s.io
    resources:
      - runtimeclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vivek-dev-skypilot-read
  labels:
    app.kubernetes.io/managed-by: codex
    app.kubernetes.io/name: vivek-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vivek-dev-skypilot-read
subjects:
  - kind: ServiceAccount
    name: vivek-dev
    namespace: default
