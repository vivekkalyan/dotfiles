# Pre-commit configuration for uv-managed Python projects.
#
# Usage:
#   uv run prek install
#   uv run prek run --all-files
#
# Ruff, ty, and prek should be project dev dependencies. Keep their versions in
# pyproject.toml/uv.lock instead of duplicating versions in hook repos.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false

  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

# Optional security hooks live in references/security-setup.md. Add them only
# when the project needs shell, workflow, or secret scanning.
